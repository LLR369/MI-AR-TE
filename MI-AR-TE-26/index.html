<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR - Obras de Arte</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; color: #fff; text-align: center; padding: 2rem;
    }
    #overlay h1 { font-size: 2rem; margin-bottom: 1rem; }
    #overlay p { opacity: 0.7; margin-bottom: 2rem; max-width: 300px; line-height: 1.6; }
    #btn-start {
      background: #fff; color: #000; border: none; border-radius: 9999px;
      padding: 0.85rem 2.5rem; font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    #hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; font-size: 0.85rem;
      padding: 0.5rem 1.2rem; border-radius: 9999px; z-index: 100;
      display: none; backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

<div id="overlay">
  <div style="font-size:3.5rem; margin-bottom:1rem;">🎨</div>
  <h1>AR · Obras de Arte</h1>
  <p>Apunta tu cámara a la obra de arte para ver la experiencia.</p>
  <button id="btn-start">Iniciar cámara</button>
</div>

<div id="hint">📷 Apunta a la obra de arte</div>

<a-scene
  mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <!-- Cambia "tu-video.webm" por el nombre de tu video -->
    <video id="ar-video" src="https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/la-mona-llr-2026a.webm"
      playsinline webkit-playsinline muted loop crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- index="0" = primera obra. Para la segunda obra usa index="1" -->
  <a-entity mindar-image-target="targetIndex: 0">
    <!-- Ajusta width/height según la proporción de tu video
         16:9 → width="1.6" height="0.9"
         1:1  → width="1"   height="1"    -->
    <a-plane
      position="0 0 0.001"
      width="1.6" height="0.9"
      material="src: #ar-video; transparent: true; alphaTest: 0.1; side: double"
      video-auto-play>
    </a-plane>
  </a-entity>

</a-scene>

<script>
  AFRAME.registerComponent('video-auto-play', {
    init: function () {
      const video = document.querySelector('#ar-video');
      const target = this.el.parentEl;
      target.addEventListener('targetFound', () => {
        video.play().catch(() => {});
        document.getElementById('hint').style.display = 'none';
      });
      target.addEventListener('targetLost', () => {
        video.pause();
        document.getElementById('hint').style.display = 'block';
      });
    }
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hint').style.display = 'block';
    const scene = document.querySelector('a-scene');
    const start = () => {
      const ar = scene.systems['mindar-image-system'];
      if (ar) ar.start();
    };
    scene.hasLoaded ? start() : scene.addEventListener('loaded', start);
  });
</script>
</body>
</html>
