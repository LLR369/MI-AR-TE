<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>MI-AR-TE - Video AR</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Visual theme provided by user, adapted to the AR UI */
    :root {
      --bg: #000;
      --accent: #b0976d;
      --border: rgba(176,151,109,.28);
      --radius: 22px;

      --controls-bg: rgba(0,0,0,.36);
      --controls-btn-bg: #0b0b0b;
      --controls-btn-active: var(--accent);
      --label-bg: rgba(255,255,255,.06);
    }

    /* Page baseline (applies to overlay card) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: none; }
    body {
      min-height: 100dvh;
      background: var(--bg);
      color: #fff;
      font-family: 'Heebo', sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* Home overlay styled as card centered */
    #homeOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.72));
      z-index: 10003;
      padding: clamp(18px, 4vw, 36px);
    }
    .card {
      width: min(920px, 94vw);
      max-width: 640px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: clamp(18px, 4vw, 28px);
      padding: clamp(20px, 4vw, 36px);
      box-shadow: 0 20px 50px rgba(0,0,0,.55);
      text-align: center;
      color: rgba(255,255,255,.94);
    }

    /* Profile / logo */
    .profile-wrap { display:flex; justify-content:center; margin-bottom: clamp(12px, 3vw, 20px); }
    .profile-image {
      width: clamp(96px, 20vw, 140px);
      height: clamp(96px, 20vw, 140px);
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 8px rgba(176,151,109,.08), 0 8px 30px rgba(0,0,0,.5);
      display:block;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }
    .profile-note {
      margin-top: 10px;
      font-size: .82rem;
      color: rgba(255,255,255,.72);
      font-weight: 700;
      letter-spacing: .02em;
    }

    /* Title and tagline */
    h1 {
      font-family: 'Anton', sans-serif;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-size: clamp(2rem, 6.5vw, 3.2rem);
      line-height: 1;
      margin: 10px 0 6px;
      color: var(--accent);
    }
    .tagline {
      font-size: clamp(.9rem, 2.2vw, 1rem);
      color: rgba(255,255,255,.78);
      line-height: 1.6;
      margin-bottom: clamp(14px, 3.5vw, 22px);
      max-width: 44ch;
      margin-left: auto;
      margin-right: auto;
    }

    /* Links area */
    .home-links { display:flex; gap:12px; justify-content:center; margin: 14px 0 18px; flex-wrap:wrap; }
    .home-link-btn {
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 800;
      font-family: 'Anton', sans-serif;
      letter-spacing: .04em;
      text-transform: uppercase;
      display:inline-flex;
      align-items:center;
      gap:10px;
      box-shadow: 0 8px 22px rgba(176,151,109,.18);
      transition: transform .18s ease, background .18s ease, color .18s ease;
    }
    .home-link-btn:hover, .home-link-btn:focus {
      background: #0f0f0f;
      color: var(--accent);
      transform: translateY(-3px);
      outline: none;
    }

    /* Start button */
    #startScanBtn {
      display:inline-block;
      margin-top: 12px;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 800;
      font-family: 'Anton', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }
    #startScanBtn:hover { background: var(--accent); color: #000; transform: translateY(-3px); }

    /* Small footer */
    .home-footer { margin-top: 12px; color: rgba(255,255,255,.36); font-size: .86rem; }

    /* AR controls (kept functional but restyled to match theme) */
    #label {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: var(--label-bg);
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 9998;
      max-width: 90vw;
      text-align: center;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.03);
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      display:flex;
      gap:12px;
      align-items:center;
      z-index:10000;
      pointer-events:auto;
      transition: opacity .25s, transform .2s;
      opacity:0;
      visibility:hidden;
      transform-origin:center;
      transform: translateX(-50%) translateY(6px);
      background: transparent;
    }
    #controls.visible { opacity:1; visibility:visible; transform: translateX(-50%) translateY(0); }

    .ctrl-btn {
      width:52px;
      height:52px;
      border-radius:999px;
      border:0;
      background: var(--controls-btn-bg);
      color: var(--btn-icon, #fff);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 10px 30px rgba(0,0,0,.6);
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }
    .ctrl-btn:active { transform: scale(.98); }
    .ctrl-btn svg { width:22px; height:22px; fill: currentColor; }
    .ctrl-btn.active { background: var(--controls-btn-active); color: #000; box-shadow: 0 18px 36px rgba(176,151,109,.18); }

    .hidden-while-playing { opacity:0; pointer-events:none; transform: translateY(6px); transition: opacity .18s ease, transform .18s ease; }

    /* Responsive tweaks */
    @media (max-width:420px) {
      .card { padding: 18px; }
      .profile-image { width: 96px; height: 96px; }
      .home-link-btn { padding: 10px 12px; font-size: .9rem; }
      #controls { bottom: 80px; }
    }
  </style>
</head>
<body>

  <div id="label">Escanea la obra</div>

  <!-- Controls -->
  <div id="controls" aria-hidden="true">
    <button id="playTargetBtn" class="ctrl-btn" title="Reproducir anclado" aria-label="Reproducir anclado">
      <svg viewBox="0 0 24 24"><path d="M6 4v16l12-8z"/></svg>
    </button>

    <button id="homeBtn" class="ctrl-btn" title="Inicio" aria-label="Inicio">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>

    <button id="playFixedBtn" class="ctrl-btn" title="Abrir video fijo en nueva pestaña" aria-label="Abrir video fijo">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

  <!-- Home overlay (card visual) -->
  <div id="homeOverlay" role="dialog" aria-modal="true">
    <div class="card" role="document" aria-label="Pantalla de inicio">
      <div class="profile-wrap">
        <!-- Reemplaza el src por la URL de tu logo/perfil -->
        <img class="profile-image" src="REEMPLAZA_AQUI_EL_URL_O_RUTA_DE_TU_IMAGEN" alt="Logo / Perfil" width="140" height="140" loading="eager" />
      </div>

      <div class="profile-note">Perfil oficial — LLR</div>

      <h1>LLR</h1>
      <p class="tagline">Artista multidisciplinario mexicano que fusiona arte, música y tecnología en experiencias inmersivas.</p>

      <div class="home-links" aria-hidden="false">
        <a id="linkDev" class="home-link-btn" href="https://triapestudio.com/" target="_blank" rel="noopener noreferrer">
          <span>Desarrolladora</span>
        </a>
        <a id="linkRedes" class="home-link-btn" href="https://llr-musica.com/artists/llr/" target="_blank" rel="noopener noreferrer">
          <span>Redes del creador</span>
        </a>
      </div>

      <p style="font-size:13px;color:rgba(255,255,255,.72);margin-top:6px;">Toca iniciar el escaneo para activar la cámara y comenzar la experiencia AR.</p>

      <button id="startScanBtn" aria-label="Iniciar escaneo">Iniciar el escaneo</button>

      <div class="home-footer">MI-AR-TE · Experiencia AR</div>
    </div>
  </div>

  <!-- A-Frame scene con MindAR -->
  <a-scene id="scene"
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="arVideo" crossorigin="anonymous" playsinline webkit-playsinline preload="auto" loop></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane id="videoPlane" visible="false" position="0 0 0.01" rotation="0 0 0" width="1" height="1"
        material="shader: flat; src: #arVideo; side: double; transparent: true;"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    // DOM references
    const label = document.getElementById('label');
    const controls = document.getElementById('controls');
    const playTargetBtn = document.getElementById('playTargetBtn');
    const homeBtn = document.getElementById('homeBtn');
    const playFixedBtn = document.getElementById('playFixedBtn');
    const homeOverlay = document.getElementById('homeOverlay');
    const startScanBtn = document.getElementById('startScanBtn');
    const arVideo = document.getElementById('arVideo');
    const videoPlane = document.getElementById('videoPlane');
    const sceneEl = document.getElementById('scene');
    const targetEntity = document.querySelector('[mindar-image-target]');
    const linkDev = document.getElementById('linkDev');
    const linkRedes = document.getElementById('linkRedes');

    // Video URL (mantén tu URL)
    const VIDEO_URL = "https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/la-mona-llr-2026a.webm";

    // Initialize AR video (audio always active)
    arVideo.src = VIDEO_URL;
    arVideo.crossOrigin = "anonymous";
    arVideo.muted = false;
    arVideo.loop = true;
    arVideo.playsInline = true;
    arVideo.preload = "auto";

    // State
    let scanning = false;
    let userStartedAr = false;
    let lastTap = 0;
    const DOUBLE_TAP_MS = 300;
    let forceShowTimeout = null;
    let controlsTimeout = null;
    const CONTROLS_HIDE_MS = 3500;

    // Flags/data for dynamic sizing
    let videoReady = false;
    let lastTargetBoxSize = null;
    let threeAvailable = !!window.THREE;

    // Utility: hide/show all control buttons together (including home)
    function setControlsHiddenWhilePlaying(hidden) {
      const children = [...controls.children];
      children.forEach(ch => {
        if (hidden) ch.classList.add('hidden-while-playing');
        else ch.classList.remove('hidden-while-playing');
      });
    }

    // Helpers to stop and release streams
    function stopAndReleaseStream(videoEl){
      try{
        const s = videoEl && videoEl.srcObject;
        if (s && s.getTracks) s.getTracks().forEach(t=>{ try{ t.stop(); }catch(e){} });
      }catch(e){}
      try{ if (videoEl) videoEl.srcObject = null; }catch(e){}
    }

    async function stopMindARCamera(){
      try{
        const mindarSystem = sceneEl.systems['mindar-image'];
        if (mindarSystem){
          if (typeof mindarSystem.stop === 'function') await mindarSystem.stop();
          const internalVideo = mindarSystem.video || mindarSystem.videoEl || mindarSystem._video;
          if (internalVideo && internalVideo.srcObject){
            try{ internalVideo.srcObject.getTracks().forEach(t=>t.stop()); }catch(e){}
            try{ internalVideo.srcObject = null; }catch(e){}
          }
        }
      }catch(e){ console.warn('stopMindARCamera error', e); }
      try{
        document.querySelectorAll('video').forEach(v=>{
          if (v && v.srcObject && v.srcObject.getTracks){
            try{ v.srcObject.getTracks().forEach(t=>t.stop()); }catch(e){}
            try{ v.srcObject = null; }catch(e){}
          }
        });
      }catch(e){}
    }

    // Controls show/hide helpers
    function showControlsTemporarily() {
      if (!scanning) return;
      controls.classList.add('visible');
      if (controlsTimeout) clearTimeout(controlsTimeout);
      controlsTimeout = setTimeout(()=>controls.classList.remove('visible'), CONTROLS_HIDE_MS);
    }

    function forceShowControls(duration = 4000) {
      if (forceShowTimeout) { clearTimeout(forceShowTimeout); forceShowTimeout = null; }
      const children = [...controls.children];
      children.forEach(ch => ch.classList.remove('hidden-while-playing'));
      controls.classList.add('visible');
      forceShowTimeout = setTimeout(() => {
        if (!arVideo.paused && userStartedAr) {
          setControlsHiddenWhilePlaying(true);
          controls.classList.remove('visible');
        } else {
          controls.classList.add('visible');
        }
        forceShowTimeout = null;
      }, duration);
    }

    function handleTapEvent(e) {
      const now = Date.now();
      if (now - lastTap <= DOUBLE_TAP_MS) {
        e.preventDefault();
        forceShowControls(4000);
        lastTap = 0;
      } else {
        if (scanning) showControlsTemporarily();
        lastTap = now;
      }
    }

    // Dynamic plane sizing: cover target while preserving video aspect
    function updatePlaneSizeIfReady() {
      if (!videoReady || !lastTargetBoxSize) return;
      const targetWidth = lastTargetBoxSize.x || 1;
      const targetHeight = lastTargetBoxSize.y || 1;

      const vw = arVideo.videoWidth || 16;
      const vh = arVideo.videoHeight || 9;
      const videoAspect = vw / vh;
      const targetAspect = targetWidth / targetHeight;

      let planeWidth, planeHeight;

      if (videoAspect > targetAspect) {
        planeHeight = targetHeight;
        planeWidth = planeHeight * videoAspect;
      } else {
        planeWidth = targetWidth;
        planeHeight = planeWidth / videoAspect;
      }

      videoPlane.setAttribute('width', planeWidth);
      videoPlane.setAttribute('height', planeHeight);
      videoPlane.setAttribute('position', `0 0 0.01`);
      videoPlane.setAttribute('visible', 'true');
    }

    arVideo.addEventListener('loadedmetadata', () => {
      videoReady = true;
      updatePlaneSizeIfReady();
    });

    function computeTargetBoxSize() {
      try {
        if (!threeAvailable) {
          lastTargetBoxSize = { x: 1, y: 1, z: 0.01 };
          return;
        }
        const obj = targetEntity.object3D;
        const box = new THREE.Box3().setFromObject(obj);
        const size = new THREE.Vector3();
        box.getSize(size);
        if (!size.x || !size.y) {
          lastTargetBoxSize = { x: 1, y: 1, z: 0.01 };
        } else {
          lastTargetBoxSize = { x: size.x, y: size.y, z: size.z };
        }
      } catch (e) {
        lastTargetBoxSize = { x: 1, y: 1, z: 0.01 };
      }
    }

    // MindAR events
    targetEntity.addEventListener('targetFound', async () => {
      if (!scanning) return;
      computeTargetBoxSize();
      updatePlaneSizeIfReady();

      videoPlane.setAttribute('visible','true');
      label.textContent = 'Obra detectada. Doble tap para mostrar controles';
      setControlsHiddenWhilePlaying(true);
      controls.classList.remove('visible');
      if (userStartedAr && arVideo.paused) {
        try{ await arVideo.play().catch(()=>{}); }catch(e){}
      }
    });

    targetEntity.addEventListener('targetLost', () => {
      videoPlane.setAttribute('visible','false');
      label.textContent = 'Escanea la obra';
      controls.classList.remove('visible');
      setControlsHiddenWhilePlaying(false);
      try{ if (!arVideo.paused) arVideo.pause(); }catch(e){}
    });

    document.addEventListener('click', handleTapEvent, { passive: false });
    document.addEventListener('touchstart', handleTapEvent, { passive: false });

    // Play target
    playTargetBtn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      try {
        if (arVideo.paused) {
          await arVideo.play();
          userStartedAr = true;
          playTargetBtn.classList.add('active');
          playTargetBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
          setControlsHiddenWhilePlaying(true);
          controls.classList.remove('visible');
        } else {
          arVideo.pause();
          playTargetBtn.classList.remove('active');
          playTargetBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 4v16l12-8z"/></svg>';
          setControlsHiddenWhilePlaying(false);
          controls.classList.add('visible');
        }
      } catch (e) { console.warn(e); }
    });

    // Home (stop + reset)
    homeBtn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      try{ await stopMindARCamera(); }catch(e){ console.warn(e); }
      try{ if (!arVideo.paused) arVideo.pause(); }catch(e){}
      try{ arVideo.src = VIDEO_URL; }catch(e){}
      stopAndReleaseStream(arVideo);
      scanning = false;
      userStartedAr = false;
      playTargetBtn.classList.remove('active');
      playTargetBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 4v16l12-8z"/></svg>';
      setControlsHiddenWhilePlaying(false);
      controls.classList.remove('visible');
      homeOverlay.style.display = 'flex';
      label.textContent = 'Escaneo detenido';
      setTimeout(()=>{ location.reload(); }, 250);
    });

    // Play fixed (open video in new tab)
    playFixedBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      try { if (!arVideo.paused) arVideo.pause(); } catch(e){}
      window.open(VIDEO_URL, '_blank');
      playFixedBtn.classList.add('active');
      setTimeout(()=>playFixedBtn.classList.remove('active'), 1200);
    });

    // Start scan
    startScanBtn.addEventListener('click', async () => {
      homeOverlay.style.display = 'none';
      scanning = true;
      try {
        const mindarSystem = sceneEl.systems['mindar-image'];
        if (mindarSystem && typeof mindarSystem.start === 'function') {
          await mindarSystem.start();
        }
      } catch (e) { console.warn(e); }
      label.textContent = 'Apunta la cámara a la obra';
      controls.classList.add('visible');
      setControlsHiddenWhilePlaying(false);
    });

    // Auto-resume guard
    let attemptedAutoResume = false;
    arVideo.addEventListener('pause', async () => {
      if (scanning && userStartedAr && !attemptedAutoResume) {
        attemptedAutoResume = true;
        try { await arVideo.play().catch(()=>{}); } catch (e) {}
        setTimeout(()=>attemptedAutoResume = false, 1500);
      }
    });

    // Clean up on pagehide
    window.addEventListener('pagehide', () => {
      try{ if (!arVideo.paused) arVideo.pause(); }catch(e){}
      stopAndReleaseStream(arVideo);
    });

    // Ensure links open in new tab on all devices (fallback)
    function safeOpen(url) {
      try {
        const w = window.open(url, '_blank', 'noopener');
        if (!w) window.location.href = url;
      } catch (e) {
        window.location.href = url;
      }
    }
    linkDev.addEventListener('touchend', (e) => { e.preventDefault(); safeOpen(linkDev.href); });
    linkRedes.addEventListener('touchend', (e) => { e.preventDefault(); safeOpen(linkRedes.href); });

    // Start state
    homeOverlay.style.display = 'flex';
    controls.classList.remove('visible');
    setControlsHiddenWhilePlaying(false);
  </script>

</body>
</html>
