<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MI-AR-TE</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    #label {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      text-align: center;
      max-width: 90vw;
    }

    #playBtn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      color: #fff;
      border: 0;
      border-radius: 999px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 700;
      pointer-events: auto;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }

    #playBtn:active {
      transform: translate(-50%, -50%) scale(0.98);
    }
  </style>
</head>
<body>

  <div id="ui">
    <button id="playBtn">Reproducir video</button>
    <div id="label">Escanea la obra</div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="ar-video"
        src="https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/la-mona-llr-2026a.webm"
        preload="auto"
        playsinline
        webkit-playsinline
        muted
        loop
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        id="videoEntity"
        src="#ar-video"
        position="0 0 0.01"
        width="1"
        height="1"
        visible="false"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const label = document.getElementById('label');
    const playBtn = document.getElementById('playBtn');
    const video = document.getElementById('ar-video');
    const target = document.getElementById('target');
    const videoEntity = document.getElementById('videoEntity');

    let targetDetected = false;
    let userUnlocked = false;

    async function prepareVideo() {
      try {
        video.muted = true;
        await video.play();
        video.pause();
        video.currentTime = 0;
        userUnlocked = true;
        label.textContent = targetDetected ? 'Obra detectada. Pulsa reproducir' : 'Video listo. Escanea la obra';
        playBtn.style.display = 'block';
      } catch (e) {
        label.textContent = 'El navegador bloqueó el video';
        console.log(e);
      }
    }

    async function startVideo() {
      try {
        if (!userUnlocked) {
          await prepareVideo();
        }
        videoEntity.setAttribute('visible', true);
        await video.play();
        label.textContent = 'Video reproduciéndose';
        playBtn.textContent = 'Pausar video';
        playBtn.style.display = 'block';
      } catch (e) {
        label.textContent = 'No se pudo reproducir el video';
        console.log(e);
      }
    }

    function stopVideo() {
      video.pause();
      videoEntity.setAttribute('visible', false);
      playBtn.textContent = 'Reproducir video';
      label.textContent = 'Video detenido';
    }

    playBtn.addEventListener('click', async () => {
      if (video.paused) {
        await startVideo();
      } else {
        stopVideo();
      }
    });

    target.addEventListener('targetFound', () => {
      targetDetected = true;
      label.textContent = 'Obra detectada. Pulsa reproducir';
      playBtn.style.display = 'block';
      if (!userUnlocked) {
        prepareVideo();
      }
    });

    target.addEventListener('targetLost', () => {
      targetDetected = false;
      stopVideo();
      if (userUnlocked) {
        label.textContent = 'Apunta otra vez a la obra';
      } else {
        label.textContent = 'Escanea la obra';
      }
    });

    video.addEventListener('error', () => {
      label.textContent = 'Error con el archivo de video';
    });

    video.addEventListener('loadeddata', () => {
      if (!targetDetected) {
        label.textContent = 'Video cargado. Escanea la obra';
      }
    });
  </script>

</body>
</html>
