<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MI-AR-TE</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    #overlay h1 {
      margin: 0 0 12px 0;
      font-size: 32px;
    }

    #overlay p {
      margin: 0 0 24px 0;
      max-width: 320px;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
    }

    #startButton {
      background: #fff;
      color: #000;
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 9998;
      display: none;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>MI-AR-TE</h1>
    <p>Presiona el botón, permite la cámara y apunta a la obra para ver el video con transparencia.</p>
    <button id="startButton">Usar cámara</button>
  </div>

  <div id="hint">Apunta a la obra</div>

  <a-scene
    embedded
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="ar-video"
        src="https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/la-mona-llr-2026a.webm"
        preload="auto"
        response-type="arraybuffer"
        playsinline
        webkit-playsinline
        muted
        loop
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video
        id="videoPlane"
        src="#ar-video"
        position="0 0 0.01"
        width="1.6"
        height="0.9"
        rotation="0 0 0"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const overlay = document.getElementById("overlay");
    const hint = document.getElementById("hint");
    const startButton = document.getElementById("startButton");
    const scene = document.querySelector("a-scene");
    const video = document.getElementById("ar-video");
    const target = document.querySelector('[mindar-image-target="targetIndex: 0"]');

    startButton.addEventListener("click", async () => {
      overlay.style.display = "none";
      hint.style.display = "block";

      const startAR = () => {
        const arSystem = scene.systems["mindar-image-system"];
        if (arSystem) arSystem.start();
      };

      if (scene.hasLoaded) {
        startAR();
      } else {
        scene.addEventListener("loaded", startAR, { once: true });
      }
    });

    target.addEventListener("targetFound", async () => {
      hint.style.display = "none";
      try {
        video.currentTime = 0;
        await video.play();
      } catch (e) {
        console.log("No se pudo reproducir el video automáticamente:", e);
      }
    });

    target.addEventListener("targetLost", () => {
      hint.style.display = "block";
      video.pause();
    });
  </script>

</body>
</html>
