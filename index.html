<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>MI-AR-TE - Video AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,body { margin:0; height:100%; background:transparent; font-family:Arial,Helvetica,sans-serif; -webkit-tap-highlight-color: transparent; }
    #label { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:rgba(0,0,0,.72); color:#fff; padding:8px 12px; border-radius:999px; font-size:13px; z-index:9999; max-width:90vw; text-align:center; pointer-events:none; }
    /* Contenedor de controles en fila, alineado abajo */
    #controls {
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:flex;
      gap:12px;
      align-items:center;
      z-index:10000;
      pointer-events:auto;
      transition:opacity .25s ease;
      opacity:0;
      visibility:hidden;
    }
    /* Botones circulares con iconos SVG */
    .ctrl-btn {
      width:52px;
      height:52px;
      border-radius:999px;
      border:0;
      background:rgba(0,0,0,0.72);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.35);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }
    .ctrl-btn:active { transform:scale(.98); }
    .ctrl-btn svg { width:22px; height:22px; display:block; fill:currentColor; }

    /* Visible state for controls */
    #controls.visible { opacity:1; visibility:visible; }

    /* Overlay */
    #videoOverlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.35); z-index:10001; }
    #videoBox { position:relative; width:min(92vw,900px); max-height:85vh; }
    #overlayVideo { width:100%; max-height:85vh; display:block; background:#000; border-radius:12px; }
    #closeBtn { position:absolute; top:-14px; right:-14px; width:40px; height:40px; border:0; border-radius:999px; background:#111; color:#fff; font-size:20px; z-index:2; display:flex; align-items:center; justify-content:center; }
    /* Small helper for hidden elements on target lost */
    .hidden { display:none !important; }
  </style>
</head>
<body>

  <div id="label">Escanea la obra</div>

  <!-- Controles en fila (aparecen al tocar la pantalla y se ocultan automáticamente) -->
  <div id="controls" aria-hidden="true">
    <!-- Play overlay (icono: expandir/reproducir) -->
    <button id="playBtn" class="ctrl-btn" title="Ver video (pantalla grande)" aria-label="Ver video">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4z" fill="none"/><path d="M8 6v12l10-6z"/></svg>
    </button>

    <!-- Toggle play/pause (control central) -->
    <button id="togglePlay" class="ctrl-btn" title="Reproducir / Pausar" aria-label="Reproducir o pausar">
      <svg id="toggleIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4v16l12-8z"/></svg>
    </button>

    <!-- Audio toggle (icono: altavoz) -->
    <button id="audioToggle" class="ctrl-btn" title="Activar / Silenciar audio" aria-label="Activar o silenciar audio">
      <svg id="audioIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 9v6h4l5 5V4L9 9H5z"/></svg>
    </button>
  </div>

  <!-- Overlay de video grande -->
  <div id="videoOverlay">
    <div id="videoBox">
      <button id="closeBtn" aria-label="Cerrar overlay">×</button>
      <video id="overlayVideo" playsinline webkit-playsinline controls preload="metadata"></video>
    </div>
  </div>

  <!-- A-Frame scene con MindAR -->
  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <!-- Video maestro (textura AR). Debe permitir CORS -->
      <video id="arVideo" crossorigin="anonymous" playsinline webkit-playsinline preload="auto" loop muted></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target: plano frontal en Z; visible controlado por JS -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane id="videoPlane"
               visible="false"
               position="0 0 0.01"
               rotation="0 0 0"
               width="1.2"
               height="0.675"
               material="shader: flat; src: #arVideo; side: double; transparent: true;">
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
    // DOM
    const label = document.getElementById('label');
    const controls = document.getElementById('controls');
    const playBtn = document.getElementById('playBtn');
    const audioToggle = document.getElementById('audioToggle');
    const togglePlay = document.getElementById('togglePlay');
    const toggleIcon = document.getElementById('toggleIcon');
    const audioIcon = document.getElementById('audioIcon');
    const videoOverlay = document.getElementById('videoOverlay');
    const overlayVideo = document.getElementById('overlayVideo');
    const closeBtn = document.getElementById('closeBtn');
    const arVideo = document.getElementById('arVideo');
    const videoPlane = document.getElementById('videoPlane');

    // URL del video
    const VIDEO_URL = "https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/Las-cronicas-de-un-zoo-logico-2026-leonardo-lumbreras-rodriguez.mp4";

    // Inicialización video maestro
    arVideo.src = VIDEO_URL;
    arVideo.crossOrigin = "anonymous";
    arVideo.muted = true; // textura muteada para permitir autoplay
    arVideo.loop = true;
    arVideo.playsInline = true;
    arVideo.preload = "auto";

    overlayVideo.crossOrigin = "anonymous";
    overlayVideo.playsInline = true;
    overlayVideo.preload = "metadata";
    overlayVideo.muted = true; // por defecto silenciado hasta gesto del usuario

    let targetDetected = false;
    let usingCaptureStream = false;
    let syncInterval = null;
    let controlsTimeout = null;
    const CONTROLS_HIDE_MS = 3500; // tiempo para ocultar controles tras interacción

    const targetEntity = document.querySelector('[mindar-image-target]');
    const sceneEl = document.querySelector('a-scene');

    // Ajustar automáticamente el tamaño del plano según la relación de aspecto del video
    arVideo.addEventListener('loadedmetadata', () => {
      const vw = arVideo.videoWidth || 16;
      const vh = arVideo.videoHeight || 9;
      const aspect = vw / vh;
      const baseHeight = 0.675;
      const newWidth = baseHeight * aspect;
      videoPlane.setAttribute('width', newWidth);
      videoPlane.setAttribute('height', baseHeight);
    });

    // Mostrar controles (aparecen en fila inferior) y auto-ocultar
    function showControlsTemporarily() {
      if (!targetDetected) return; // solo mostrar si el target está detectado
      controls.classList.add('visible');
      controls.setAttribute('aria-hidden', 'false');
      // limpiar timeout previo
      if (controlsTimeout) clearTimeout(controlsTimeout);
      controlsTimeout = setTimeout(hideControls, CONTROLS_HIDE_MS);
    }
    function hideControls() {
      controls.classList.remove('visible');
      controls.setAttribute('aria-hidden', 'true');
      if (controlsTimeout) { clearTimeout(controlsTimeout); controlsTimeout = null; }
    }

    // Mostrar controles al tocar la pantalla (o click) — aparece solo si target detectado
    function onUserTap() {
      if (!targetDetected) return;
      showControlsTemporarily();
    }
    // Escuchar taps/clicks en la escena y en la página
    document.addEventListener('click', onUserTap, { passive: true });
    document.addEventListener('touchstart', onUserTap, { passive: true });

    // Cuando se detecta el target: mostrar plano y reproducir textura (si hubo gesto)
    targetEntity.addEventListener('targetFound', async () => {
      targetDetected = true;
      label.textContent = 'Obra detectada. Toca la pantalla para controles';
      // mostrar controles brevemente para indicar que existen
      showControlsTemporarily();
      // mostrar el plano que sigue el movimiento del target
      videoPlane.setAttribute('visible', 'true');

      // intentar reproducir la textura si el navegador lo permite
      try {
        if (arVideo.paused) {
          await arVideo.play().catch(()=>{});
        }
      } catch (e) {
        // si falla, el usuario puede usar el botón central para reproducir
      }
    });

    // Cuando se pierde el target: ocultar plano y pausar textura
    targetEntity.addEventListener('targetLost', () => {
      targetDetected = false;
      label.textContent = 'Escanea la obra';
      // ocultar controles inmediatamente
      hideControls();
      // ocultar el plano que sigue el target
      videoPlane.setAttribute('visible', 'false');
      // pausar la textura AR
      if (!arVideo.paused) arVideo.pause();
      // cerrar overlay si estaba abierto
      if (!overlayVideo.paused) overlayVideo.pause();
      videoOverlay.style.display = 'none';
      stopSyncFallback();
      if (usingCaptureStream) {
        overlayVideo.srcObject = null;
        usingCaptureStream = false;
      }
    });

    // Intentar usar captureStream para el overlay (mejor)
    function enableCaptureStream() {
      if (typeof arVideo.captureStream === 'function') {
        try {
          const stream = arVideo.captureStream();
          overlayVideo.srcObject = stream;
          usingCaptureStream = true;
          return true;
        } catch (e) {
          console.warn('captureStream falló:', e);
          usingCaptureStream = false;
          return false;
        }
      }
      return false;
    }

    // Fallback: sincronizar tiempos entre arVideo y overlayVideo
    function startSyncFallback() {
      stopSyncFallback();
      syncInterval = setInterval(() => {
        const a = arVideo.currentTime || 0;
        const b = overlayVideo.currentTime || 0;
        const diff = Math.abs(a - b);
        if (diff > 0.25) {
          try { overlayVideo.currentTime = a; } catch (e) {}
        }
        if (arVideo.paused && !overlayVideo.paused) overlayVideo.pause();
        if (!arVideo.paused && overlayVideo.paused) overlayVideo.play().catch(()=>{});
      }, 250);
    }
    function stopSyncFallback() {
      if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
    }

    // Botón reproducir: abre overlay y gestiona duplicados
    playBtn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      try {
        const ok = enableCaptureStream();

        // Si la textura AR está pausada, reproducirla (maestra)
        if (arVideo.paused) {
          await arVideo.play().catch(()=>{});
        }

        // Mostrar overlay
        videoOverlay.style.display = 'flex';

        if (ok) {
          // overlay usa el stream del arVideo (no recarga)
          try { await overlayVideo.play(); } catch (e) {}
        } else {
          // Fallback: pausamos la textura AR para evitar duplicado y reproducimos solo el overlay
          const current = arVideo.currentTime || 0;
          if (!arVideo.paused) arVideo.pause();
          overlayVideo.srcObject = null;
          overlayVideo.src = VIDEO_URL;
          overlayVideo.currentTime = current;
          // overlay por defecto se mantiene silenciado hasta gesto del usuario; no forzamos sonido
          await overlayVideo.play().catch(()=>{});
          startSyncFallback();
        }

        label.textContent = 'Video reproduciéndose';
        togglePlay.textContent = 'Pausar';
        // mostrar controles mientras overlay está abierto
        showControlsTemporarily();
      } catch (err) {
        console.error('Error al reproducir video:', err);
        label.textContent = 'No se pudo abrir el video. Toca la pantalla para permitir reproducción';
      }
    });

    // Cerrar overlay: reanudar textura AR si corresponde
    closeBtn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      if (usingCaptureStream) {
        overlayVideo.pause();
        videoOverlay.style.display = 'none';
        label.textContent = targetDetected ? 'Obra detectada. Toca la pantalla para controles' : 'Escanea la obra';
        stopSyncFallback();
        return;
      }

      try {
        const current = overlayVideo.currentTime || 0;
        overlayVideo.pause();
        overlayVideo.src = '';
        videoOverlay.style.display = 'none';
        stopSyncFallback();
        // reanudar textura AR en el mismo tiempo si el target sigue detectado
        arVideo.currentTime = current;
        if (targetDetected) {
          await arVideo.play().catch(()=>{});
        }
        label.textContent = targetDetected ? 'Obra detectada. Toca la pantalla para controles' : 'Escanea la obra';
        togglePlay.textContent = 'Reproducir';
      } catch (e) {
        console.warn('Error al cerrar overlay:', e);
        label.textContent = 'Escanea la obra';
      }
    });

    // Botón audioToggle: alterna audio del overlay (no afecta la textura AR)
    audioToggle.addEventListener('click', (ev) => {
      ev.stopPropagation();
      // Si overlay no está abierto pero captureStream está en uso, el audio se controla en overlayVideo (srcObject)
      // Alternar muted del overlayVideo
      overlayVideo.muted = !overlayVideo.muted;
      updateAudioIcon();
      // Si el overlay no está abierto y el usuario activa audio, abrir overlay para escuchar (opcional)
      // No forzamos abrir overlay automáticamente; el usuario puede abrirlo con playBtn.
    });

    function updateAudioIcon() {
      // Cambia el SVG del icono según estado muted
      if (overlayVideo.muted) {
        // icono mute
        audioIcon.innerHTML = '<path d="M16.5 12c0-1.77-.77-3.37-1.98-4.47l1.42-1.42C18.07 7.9 19 9.86 19 12s-.93 4.1-2.06 5.89l-1.42-1.42C15.73 15.37 16.5 13.77 16.5 12zM5 9v6h4l5 5V4L9 9H5z"/>';
      } else {
        // icono sonido
        audioIcon.innerHTML = '<path d="M5 9v6h4l5 5V4L9 9H5z"/>';
      }
    }

    // Botón togglePlay: controla reproducción central (overlay si visible, si no la textura AR)
    togglePlay.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      try {
        if (videoOverlay.style.display === 'flex') {
          // overlay visible: controlar overlay
          if (overlayVideo.paused) {
            await overlayVideo.play();
            setToggleIconPlaying(true);
          } else {
            overlayVideo.pause();
            setToggleIconPlaying(false);
          }
        } else {
          // overlay no visible: controlar textura AR
          if (arVideo.paused) {
            await arVideo.play();
            setToggleIconPlaying(true);
          } else {
            arVideo.pause();
            setToggleIconPlaying(false);
          }
        }
        // mostrar controles brevemente tras la acción
        showControlsTemporarily();
      } catch (e) {
        console.warn('Control play/pause falló:', e);
      }
    });

    function setToggleIconPlaying(isPlaying) {
      if (isPlaying) {
        // icono pausa
        toggleIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      } else {
        // icono play
        toggleIcon.innerHTML = '<path d="M6 4v16l12-8z"/>';
      }
    }

    // Inicializar iconos según estado
    setToggleIconPlaying(false);
    updateAudioIcon();

    // Primer gesto desbloquea audio del overlay (si el usuario lo desea)
    function firstUserGesture() {
      // no desmutear automáticamente; solo desbloquea la posibilidad de reproducir audio
      // si el usuario ya pulsó audioToggle, overlayVideo.muted será false
      document.removeEventListener('click', firstUserGesture);
    }
    document.addEventListener('click', firstUserGesture);

    // Visibilidad y limpieza
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (!arVideo.paused) arVideo.pause();
        if (!overlayVideo.paused) overlayVideo.pause();
      }
    });
    window.addEventListener('pagehide', () => {
      if (!arVideo.paused) arVideo.pause();
      if (!overlayVideo.paused) overlayVideo.pause();
      stopSyncFallback();
    });

    // Errores
    arVideo.addEventListener('error', (e) => {
      console.error('Error en arVideo:', e);
      label.textContent = 'Error cargando el video (textura). Revisa CORS o la URL.';
    });
    overlayVideo.addEventListener('error', (e) => {
      console.error('Error en overlayVideo:', e);
    });

    // Opcional: mantener el plano orientado hacia la cámara en Y (billboard)
    // Si quieres que el plano siempre mire al usuario en Y, descomenta el bloque siguiente.
    /*
    sceneEl.addEventListener('renderstart', () => {
      const cameraEl = document.querySelector('a-camera');
      sceneEl.addEventListener('frame', () => {
        if (videoPlane.getAttribute('visible') === 'true') {
          const camPos = cameraEl.object3D.getWorldPosition(new THREE.Vector3());
          const planePos = videoPlane.object3D.getWorldPosition(new THREE.Vector3());
          const dx = camPos.x - planePos.x;
          const dz = camPos.z - planePos.z;
          const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
          videoPlane.setAttribute('rotation', `0 ${yaw} 0`);
        }
      });
    });
    */

    // Iniciar MindAR cuando la escena esté lista (opcional)
    sceneEl.addEventListener('loaded', async () => {
      try {
        const mindarSystem = sceneEl.systems['mindar-image'];
        if (mindarSystem && typeof mindarSystem.start === 'function') {
          // Si quieres iniciar automáticamente, descomenta:
          // await mindarSystem.start();
        }
      } catch (e) {
        console.warn('No se pudo iniciar MindAR programáticamente:', e);
      }
    });
  </script>

</body>
</html>
