<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MI-AR-TE</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="status">Permite la cámara y apunta a la obra</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="ar-video"
        src="https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/la-mona-llr-2026a.webm"
        preload="auto"
        playsinline
        webkit-playsinline
        muted
        loop
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-video
        src="#ar-video"
        position="0 0 0.01"
        width="1"
        height="1"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const status = document.getElementById("status");
    const video = document.getElementById("ar-video");
    const target = document.getElementById("target");

    target.addEventListener("targetFound", async () => {
      status.textContent = "Obra detectada";
      try {
        video.currentTime = 0;
        await video.play();
      } catch (e) {
        status.textContent = "Obra detectada, pero el video no pudo reproducirse";
        console.log(e);
      }
    });

    target.addEventListener("targetLost", () => {
      status.textContent = "Apunta a la obra";
      video.pause();
    });
  </script>

</body>
</html>
