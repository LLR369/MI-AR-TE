<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MI-AR-TE</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }
    #label {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
    }
    #startBtn {
      position: fixed;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <button id="startBtn">Activar video</button>
  <div id="label">Pulsa activar video y apunta a la obra</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="ar-video"
        src="https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/la-mona-llr-2026a.webm"
        preload="auto"
        playsinline
        webkit-playsinline
        muted
        loop
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        id="videoEntity"
        src="#ar-video"
        position="0 0 0.01"
        width="1"
        height="1"
        visible="false"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const label = document.getElementById('label');
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('ar-video');
    const target = document.getElementById('target');
    const videoEntity = document.getElementById('videoEntity');

    let unlocked = false;
    let targetFound = false;

    async function unlockVideo() {
      try {
        await video.play();
        video.pause();
        video.currentTime = 0;
        unlocked = true;
        startBtn.style.display = 'none';
        label.textContent = 'Video activado. Ahora apunta a la obra';
      } catch (e) {
        label.textContent = 'No se pudo activar el video';
        console.log(e);
      }
    }

    async function playOnTarget() {
      if (!unlocked) {
        label.textContent = 'Primero pulsa Activar video';
        return;
      }
      if (!targetFound) return;

      try {
        videoEntity.setAttribute('visible', true);
        await video.play();
        label.textContent = 'Video reproduciendo';
      } catch (e) {
        videoEntity.setAttribute('visible', false);
        label.textContent = 'Detectó la obra pero no reprodujo';
        console.log(e);
      }
    }

    startBtn.addEventListener('click', unlockVideo);

    target.addEventListener('targetFound', async () => {
      targetFound = true;
      label.textContent = 'Obra detectada';
      await playOnTarget();
    });

    target.addEventListener('targetLost', () => {
      targetFound = false;
      video.pause();
      videoEntity.setAttribute('visible', false);
      label.textContent = 'Apunta otra vez a la obra';
    });

    video.addEventListener('loadeddata', () => {
      if (!unlocked) label.textContent = 'Video cargado. Pulsa Activar video';
    });

    video.addEventListener('error', () => {
      label.textContent = 'Error cargando el video';
    });
  </script>

</body>
</html>
