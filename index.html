<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>MI-AR-TE - Video AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,body { margin:0; height:100%; background:transparent; font-family:Arial,Helvetica,sans-serif; }
    #label { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:rgba(0,0,0,.72); color:#fff; padding:10px 16px; border-radius:999px; font-size:14px; z-index:9999; max-width:90vw; text-align:center; }
    #playBtn { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#111; color:#fff; border:0; border-radius:999px; padding:14px 20px; font-size:16px; font-weight:700; z-index:10000; display:none; }
    #videoOverlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.35); z-index:10001; }
    #videoBox { position:relative; width:min(92vw,900px); max-height:85vh; }
    #overlayVideo { width:100%; max-height:85vh; display:block; background:#000; border-radius:16px; }
    #closeBtn { position:absolute; top:-14px; right:-14px; width:40px; height:40px; border:0; border-radius:999px; background:#111; color:#fff; font-size:20px; z-index:2; }
  </style>
</head>
<body>

  <div id="label">Escanea la obra</div>
  <button id="playBtn">Ver video</button>

  <div id="videoOverlay">
    <div id="videoBox">
      <button id="closeBtn">×</button>
      <video id="overlayVideo" playsinline webkit-playsinline controls preload="metadata"></video>
    </div>
  </div>

  <!-- A-Frame scene con MindAR -->
  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <!-- assets: el video se carga aquí como textura -->
    <a-assets>
      <!-- IMPORTANTE: la URL del video debe permitir CORS (Access-Control-Allow-Origin) -->
      <video id="arVideo" crossorigin="anonymous" playsinline webkit-playsinline preload="auto" loop muted></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Entidad objetivo: el contenido se coloca dentro para que siga el target -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- Plano donde se proyecta el video. Ajusta width/height según la proporción del video/obra -->
      <a-plane id="videoPlane"
               position="0 0 0"
               rotation="-90 0 0"
               width="1.2"
               height="0.675"
               material="shader: flat; src: #arVideo; transparent: true;">
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
    // Elementos DOM
    const label = document.getElementById('label');
    const playBtn = document.getElementById('playBtn');
    const videoOverlay = document.getElementById('videoOverlay');
    const overlayVideo = document.getElementById('overlayVideo');
    const closeBtn = document.getElementById('closeBtn');

    // Video asset dentro de a-assets (textura AR)
    const arVideo = document.getElementById('arVideo');

    // URL del video en Cloudflare R2 (reemplaza si hace falta)
    const VIDEO_URL = "https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/Las-cronicas-de-un-zoo-logico-2026-leonardo-lumbreras-rodriguez.mp4";

    // Configuración inicial del video maestro (textura)
    arVideo.src = VIDEO_URL;
    arVideo.crossOrigin = "anonymous";
    arVideo.muted = true; // permite autoplay en móviles
    arVideo.loop = true;
    arVideo.playsInline = true;
    arVideo.preload = "auto";

    // Overlay no tendrá src directo inicialmente
    overlayVideo.crossOrigin = "anonymous";
    overlayVideo.playsInline = true;
    overlayVideo.preload = "metadata";

    // Estado
    let targetDetected = false;
    let streamMirroring = false;
    let syncingInterval = null;

    // Referencia a la entidad target de A-Frame
    const targetEntity = document.querySelector('[mindar-image-target]');

    // Eventos MindAR
    targetEntity.addEventListener('targetFound', () => {
      targetDetected = true;
      label.textContent = 'Obra detectada. Pulsa Ver video';
      playBtn.style.display = 'block';
    });

    targetEntity.addEventListener('targetLost', () => {
      targetDetected = false;
      label.textContent = 'Escanea la obra';
      playBtn.style.display = 'none';
      // Pausar la textura AR (maestra)
      if (!arVideo.paused) arVideo.pause();
      // cerrar overlay si estaba abierto
      if (!overlayVideo.paused) overlayVideo.pause();
      videoOverlay.style.display = 'none';
      // limpiar sincronización si existe
      stopSyncFallback();
    });

    // Función para iniciar mirror con captureStream (si está disponible)
    function tryUseCaptureStream() {
      if (typeof arVideo.captureStream === 'function') {
        try {
          const stream = arVideo.captureStream();
          overlayVideo.srcObject = stream;
          streamMirroring = true;
          return true;
        } catch (e) {
          console.warn('captureStream falló:', e);
          streamMirroring = false;
          return false;
        }
      }
      return false;
    }

    // Fallback: sincronizar currentTime entre arVideo y overlayVideo
    function startSyncFallback() {
      stopSyncFallback();
      syncingInterval = setInterval(() => {
        const diff = Math.abs((arVideo.currentTime || 0) - (overlayVideo.currentTime || 0));
        if (diff > 0.25) {
          try {
            overlayVideo.currentTime = arVideo.currentTime;
          } catch (e) {
            // algunos navegadores bloquean set currentTime si no hay interacción
          }
        }
        if (arVideo.paused && !overlayVideo.paused) overlayVideo.pause();
        if (!arVideo.paused && overlayVideo.paused) {
          overlayVideo.play().catch(()=>{});
        }
      }, 250);
    }

    function stopSyncFallback() {
      if (syncingInterval) {
        clearInterval(syncingInterval);
        syncingInterval = null;
      }
    }

    // Botón para reproducir el video (user gesture para móviles)
    playBtn.addEventListener('click', async () => {
      try {
        // Intentar usar captureStream para evitar recargas
        const usedCapture = tryUseCaptureStream();

        // Reproducir la textura AR (maestra). Está muteada para permitir autoplay.
        if (arVideo.paused) {
          await arVideo.play();
        }

        // Mostrar overlay
        videoOverlay.style.display = 'flex';

        if (usedCapture) {
          // Si usamos captureStream, overlayVideo reproducirá el stream automáticamente
          try {
            await overlayVideo.play();
          } catch (e) {
            // algunos navegadores requieren interacción para reproducir audio; overlay está sin audio por defecto
          }
        } else {
          // Fallback: usar la misma URL pero sincronizar tiempos para evitar recarga completa
          if (!overlayVideo.src || overlayVideo.src !== VIDEO_URL) {
            overlayVideo.src = VIDEO_URL;
            overlayVideo.currentTime = arVideo.currentTime || 0;
            overlayVideo.muted = true; // mantener silencio hasta que el usuario interactúe
          }
          await overlayVideo.play().catch(()=>{});
          startSyncFallback();
        }

        label.textContent = 'Video reproduciéndose';
      } catch (err) {
        console.error('Error al reproducir video:', err);
        label.textContent = 'No se pudo abrir el video. Toca la pantalla para permitir reproducción';
      }
    });

    // Cerrar overlay
    closeBtn.addEventListener('click', () => {
      overlayVideo.pause();
      videoOverlay.style.display = 'none';
      label.textContent = targetDetected ? 'Obra detectada. Pulsa Ver video' : 'Escanea la obra';
      stopSyncFallback();
    });

    // Primer gesto del usuario desbloquea audio del overlay
    function firstUserGesture() {
      overlayVideo.muted = false;
      document.removeEventListener('click', firstUserGesture);
    }
    document.addEventListener('click', firstUserGesture);

    // Manejo de visibilidad: pausar cuando la pestaña no está visible para evitar problemas de buffer
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (!arVideo.paused) arVideo.pause();
        if (!overlayVideo.paused) overlayVideo.pause();
      }
    });

    // Manejo de pagehide/unload para liberar recursos
    window.addEventListener('pagehide', () => {
      if (!arVideo.paused) arVideo.pause();
      if (!overlayVideo.paused) overlayVideo.pause();
      stopSyncFallback();
    });

    // Escuchar errores de red/decodificación para mostrar mensaje útil
    arVideo.addEventListener('error', (e) => {
      console.error('Error en arVideo:', e);
      label.textContent = 'Error cargando el video (textura). Revisa CORS o la URL.';
    });
    overlayVideo.addEventListener('error', (e) => {
      console.error('Error en overlayVideo:', e);
    });

    // Iniciar MindAR programáticamente cuando la escena esté lista (opcional)
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener('loaded', async () => {
      try {
        const mindarSystem = sceneEl.systems['mindar-image'];
        if (mindarSystem && typeof mindarSystem.start === 'function') {
          // Si prefieres iniciar automáticamente, descomenta la siguiente línea:
          // await mindarSystem.start();
        }
      } catch (e) {
        console.warn('No se pudo iniciar MindAR programáticamente:', e);
      }
    });
  </script>

</body>
</html>
