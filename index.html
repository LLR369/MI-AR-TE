<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MI-AR-TE</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }
    #label {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      text-align: center;
      max-width: 90vw;
    }
    #playBtn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      color: #fff;
      border: 0;
      border-radius: 999px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 700;
      pointer-events: auto;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }
  </style>
</head>
<body>

  <div id="ui">
    <button id="playBtn">Reproducir video</button>
    <div id="label">Escanea la obra</div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="ar-video"
        src="https://pub-27b9b10f6df84644a65bb3897f763d4c.r2.dev/Las-cronicas-de-un-zoo-logico-2026-leonardo-lumbreras-rodriguez.mp4"
        preload="auto"
        playsinline
        webkit-playsinline
        muted
        loop
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        id="videoEntity"
        src="#ar-video"
        position="0 0 0.01"
        visible="false"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const label = document.getElementById('label');
    const playBtn = document.getElementById('playBtn');
    const video = document.getElementById('ar-video');
    const target = document.getElementById('target');
    const videoEntity = document.getElementById('videoEntity');

    let targetDetected = false;
    let userUnlocked = false;
    let ready = false;
    let aspect = 16 / 9;

    function setPlaneAspect() {
      const base = 1.2;
      if (aspect >= 1) {
        videoEntity.setAttribute('width', base);
        videoEntity.setAttribute('height', base / aspect);
      } else {
        videoEntity.setAttribute('height', base);
        videoEntity.setAttribute('width', base * aspect);
      }
    }

    function loadMeta() {
      return new Promise((resolve) => {
        const done = () => {
          if (video.videoWidth && video.videoHeight) aspect = video.videoWidth / video.videoHeight;
          setPlaneAspect();
          ready = true;
          resolve();
        };
        if (video.readyState >= 1) done();
        else video.addEventListener('loadedmetadata', done, { once: true });
      });
    }

    async function unlockVideo() {
      try {
        await loadMeta();
        await video.play();
        video.pause();
        video.currentTime = 0;
        userUnlocked = true;
        playBtn.style.display = 'block';
        label.textContent = targetDetected ? 'Obra detectada. Pulsa reproducir' : 'Video listo. Escanea la obra';
      } catch (e) {
        label.textContent = 'No se pudo preparar el video';
        console.log(e);
      }
    }

    async function startVideo() {
      try {
        if (!userUnlocked) await unlockVideo();
        if (!ready) await loadMeta();
        setPlaneAspect();
        videoEntity.setAttribute('visible', true);
        await video.play();
        label.textContent = 'Video reproduciéndose';
        playBtn.textContent = 'Pausar video';
      } catch (e) {
        label.textContent = 'No se pudo reproducir el video';
        console.log(e);
      }
    }

    function stopVideo() {
      video.pause();
      video.currentTime = 0;
      videoEntity.setAttribute('visible', false);
      playBtn.textContent = 'Reproducir video';
      label.textContent = targetDetected ? 'Obra detectada. Pulsa reproducir' : 'Video detenido';
    }

    playBtn.addEventListener('click', async () => {
      if (video.paused) await startVideo();
      else stopVideo();
    });

    target.addEventListener('targetFound', () => {
      targetDetected = true;
      playBtn.style.display = 'block';
      label.textContent = 'Obra detectada. Pulsa reproducir';
      if (!userUnlocked) unlockVideo();
    });

    target.addEventListener('targetLost', () => {
      targetDetected = false;
      stopVideo();
      label.textContent = userUnlocked ? 'Apunta otra vez a la obra' : 'Escanea la obra';
    });

    loadMeta();
  </script>

</body>
</html>
